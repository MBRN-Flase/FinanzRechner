<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#030014"/>
    </linearGradient>
    <linearGradient id="accent" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6"/>
      <stop offset="100%" style="stop-color:#8b5cf6"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="512" height="512" fill="url(#bg)" rx="128"/>
  
  <!-- Glow -->
  <circle cx="256" cy="256" r="180" fill="url(#accent)" opacity="0.15"/>
  
  <!-- Chart line -->
  <path d="M120 320 L200 280 L280 200 L392 120" 
        fill="none" 
        stroke="url(#accent)" 
        stroke-width="24"
        stroke-linecap="round"
        stroke-linejoin="round"/>
  
  <!-- Arrow up -->
  <path d="M352 120 L392 120 L392 160" 
        fill="none" 
        stroke="url(#accent)" 
        stroke-width="24"
        stroke-linecap="round"
        stroke-linejoin="round"/>
  
  <!-- Spark -->
  <circle cx="392" cy="120" r="30" fill="url(#accent)"/>
</svg>
